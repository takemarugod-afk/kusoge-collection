<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謝罪RPG | 会社系クソゲー集</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; background: #0a0a16; color: #eee;
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 24px; text-align: center;
}
.emoji { font-size: 4em; margin-bottom: 16px; animation: bow 2.5s ease-in-out infinite; }
@keyframes bow { 0%,40%,100%{transform:rotate(0deg)} 20%{transform:rotate(20deg)} }
h1 { font-size: 1.6em; color: #ffd166; margin-bottom: 10px; }
.desc { font-size: 0.95em; color: #666; line-height: 1.8; max-width: 320px; margin: 0 auto 32px; }
.preview-box {
  background: #10101e; border: 1px solid #1e1e38; border-radius: 12px;
  padding: 20px 24px; max-width: 320px; margin: 0 auto 28px; text-align: left;
}
.preview-label { font-size: 0.7em; color: #555; letter-spacing: 0.1em; margin-bottom: 10px; }
.preview-choice {
  background: #1a1a2e; border: 1px solid #2a2a45; border-radius: 8px;
  padding: 10px 14px; margin-bottom: 8px; font-size: 0.84em; color: #888;
  cursor: not-allowed;
}
.preview-choice.highlight { border-color: #ffd16660; color: #ffd166; }
.badge {
  display: inline-block; background: #1a1a2e; border: 1px solid #2a2a50;
  border-radius: 8px; padding: 12px 28px; color: #555; font-size: 0.85em; margin-bottom: 32px;
}
.badge span { color: #ffd16680; }
.back { color: #444; font-size: 0.78em; text-decoration: none; }
.back:hover { color: #ffd166; }
</style>
</head>
<body>
  <div class="emoji">🙇</div>
  <h1>謝罪RPG</h1>
  <p class="desc">遅刻した。上司が怒っている。<br>土下座・菓子折り・関西弁——<br>どう謝る？</p>

  <div class="preview-box">
    <div class="preview-label">▍ ゲームプレビュー</div>
    <div class="preview-choice highlight">🍩 菓子折りを差し出す</div>
    <div class="preview-choice">🙇 土下座する（床に傷が付く）</div>
    <div class="preview-choice">🗣️ 関西弁で謝る（なぜか）</div>
    <div class="preview-choice">📧 メールで謝る（逃げた）</div>
  </div>

  <div class="badge"><span>🚧 COMING SOON</span>　フル版準備中です</div>
  <a class="back" href="index.html">← ゲーム一覧に戻る</a>
  <footer style="text-align:center;padding:32px 20px 44px;border-top:1px solid #1a1a2e;margin-top:32px;width:100%">
    <a href="https://buymeacoffee.com/tkessp" target="_blank" rel="noopener"
       style="display:inline-flex;align-items:center;gap:8px;background:#ffd166;color:#080812;font-weight:bold;font-size:0.95em;padding:12px 26px;border-radius:50px;text-decoration:none;font-family:inherit">
      ☕ Buy Me a Coffee
    </a>
    <div style="margin-top:14px;font-size:0.7em;color:#2a2a40">
      <a href="privacy.html" style="color:#333;text-decoration:none">プライバシーポリシー</a>
    </div>
  </footer>
</body>
</html>
