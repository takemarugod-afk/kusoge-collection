<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月末の謎残業</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #080812;
  color: #eee;
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px 40px;
  user-select: none;
}

.container { width: 380px; max-width: 98vw; }

/* タイトル画面 */
#titleScreen {
  position: fixed; inset: 0; background: #080812;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 4000; padding: 24px; text-align: center; transition: opacity 0.5s;
}
.ts-moon { font-size: 4em; animation: moonFloat 3.5s ease-in-out infinite; }
@keyframes moonFloat { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-10px) rotate(5deg)} }
#titleScreen h2 { font-size: 1.4em; color: #ffd166; margin: 14px 0 10px; }
#titleScreen p { color: #444; font-size: 0.86em; line-height: 1.8; max-width: 280px; margin: 0 0 6px; }
.ts-start {
  margin-top: 26px; padding: 15px 44px;
  background: #ffd166; color: #080812;
  border: none; border-radius: 10px;
  font-size: 1.1em; font-weight: bold;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,209,102,0.25); transition: transform 0.1s;
}
.ts-start:active { transform: scale(0.96); }
.ts-hint { margin-top: 14px; font-size: 0.72em; color: #333; }

/* タイトル */
.title-area { text-align: center; margin: 10px 0 14px; }
.title-area h1 { font-size: 1.2em; color: #ffd166; margin-bottom: 2px; }
.title-area .sub { font-size: 0.78em; color: #444; }

/* ステータスバー */
.status-bar {
  background: #10101e;
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.sb { text-align: center; }
.sb .sl { font-size: 0.68em; color: #555; margin-bottom: 2px; }
.sb .sv { font-size: 1em; font-weight: bold; }
.sv.red { color: #e74c3c; }
.sv.yellow { color: #ffd166; }
.sv.green { color: #2ecc71; }
.sv.blue { color: #74b9ff; }

/* 進捗ゲージ */
.progress-area {
  background: #10101e;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
}
.pa-header { display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 6px; }
.pa-title { color: #ffd166; font-weight: bold; }
.pa-pct { color: #666; }
.gauge-wrap { height: 18px; background: #080812; border-radius: 10px; overflow: hidden; border: 1px solid #1a1a30; }
.gauge-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 0.3s ease;
  position: relative;
}
.gauge-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  animation: shimmer 2s infinite;
}
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

/* メインクリックエリア */
.work-area {
  background: #10101e;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
  min-height: 160px;
}
.work-area::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #e74c3c, #f39c12, #ffd166);
}

.desk-emoji { font-size: 3em; margin-bottom: 8px; display: block; }
.task-name { font-size: 0.9em; color: #aaa; margin-bottom: 12px; min-height: 1.4em; }

.work-btn {
  width: 100%;
  padding: 14px;
  background: #1e1e38;
  border: 2px solid #2a2a50;
  border-radius: 10px;
  color: #eee;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.08s;
  position: relative;
  overflow: hidden;
}
.work-btn:active {
  transform: scale(0.97);
  background: #25253d;
  border-color: #ffd166;
}
.work-btn .btn-label { display: block; font-weight: bold; }
.work-btn .btn-sub { display: block; font-size: 0.72em; color: #666; margin-top: 2px; }

/* クリックエフェクト */
.click-fx {
  position: absolute;
  pointer-events: none;
  font-size: 0.8em;
  font-weight: bold;
  color: #ffd166;
  animation: floatUp 0.8s ease forwards;
  z-index: 10;
}
@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-50px); opacity: 0; }
}

/* アップグレード */
.upgrade-area {
  background: #10101e;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}
.upgrade-area h2 { font-size: 0.82em; color: #ffd166; margin-bottom: 10px; }
.upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.upg-btn {
  background: #1a1a2e;
  border: 1px solid #2a2a45;
  border-radius: 8px;
  padding: 8px 10px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s;
}
.upg-btn:hover { border-color: #ffd166; }
.upg-btn.maxed { border-color: #2ecc71; opacity: 0.7; cursor: default; }
.upg-btn.disabled { opacity: 0.4; cursor: not-allowed; }
.upg-name { font-size: 0.8em; font-weight: bold; margin-bottom: 2px; }
.upg-desc { font-size: 0.68em; color: #666; margin-bottom: 4px; }
.upg-cost { font-size: 0.72em; color: #ffd166; }
.upg-cost.cant { color: #444; }

/* イベントログ */
.event-log {
  background: #10101e;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
}
.event-log h2 { font-size: 0.82em; color: #ffd166; margin-bottom: 8px; }
.log-list {
  height: 100px;
  overflow-y: auto;
  font-size: 0.78em;
  line-height: 1.8;
}
.log-item { color: #666; }
.log-item.new { color: #eee; }
.log-item.bad { color: #e74c3c; }
.log-item.good { color: #2ecc71; }
.log-item.chaos { color: #a78bfa; }

/* イベントポップアップ */
.event-popup {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(8,8,18,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  display: none;
}
.event-popup.show { display: flex; }
.ep-card {
  background: #14142a;
  border: 2px solid #2a2a50;
  border-radius: 14px;
  padding: 24px 20px;
  width: 320px;
  max-width: 90vw;
  text-align: center;
  animation: popIn 0.3s cubic-bezier(.2,1.4,.6,1);
}
@keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.ep-emoji { font-size: 2.5em; margin-bottom: 8px; }
.ep-title { font-size: 1em; font-weight: bold; color: #ffd166; margin-bottom: 6px; }
.ep-desc { font-size: 0.82em; color: #aaa; line-height: 1.6; margin-bottom: 14px; }
.ep-choices { display: flex; flex-direction: column; gap: 7px; }
.ep-btn {
  padding: 10px 14px;
  background: #1e1e38;
  border: 1px solid #3a3a60;
  border-radius: 8px;
  color: #eee;
  font-size: 0.82em;
  cursor: pointer;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.1s;
}
.ep-btn:hover { background: #2a2a4a; }
.ep-hint { font-size: 0.72em; color: #666; }

/* クリア/ゲームオーバー */
.end-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(8,8,18,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.end-screen.show { display: flex; }
.end-card {
  background: #14142a;
  border-radius: 16px;
  padding: 28px 24px;
  width: 320px;
  max-width: 90vw;
  text-align: center;
  border: 2px solid #2a2a50;
}
.end-emoji { font-size: 3em; margin-bottom: 10px; }
.end-title { font-size: 1.3em; font-weight: bold; color: #ffd166; margin-bottom: 8px; }
.end-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin: 14px 0;
  font-size: 0.82em;
}
.es { background: #0a0a16; border-radius: 8px; padding: 8px; }
.es .el { color: #555; font-size: 0.8em; }
.es .ev { font-size: 1em; font-weight: bold; color: #ffd166; }
.retry-btn {
  width: 100%; padding: 13px;
  background: #ffd166; color: #080812;
  border: none; border-radius: 10px;
  font-size: 1em; font-weight: bold; cursor: pointer;
  margin-top: 4px;
}

/* イベント選択タイマーバー */
.ep-timer-wrap { height: 4px; background: #0a0a16; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.ep-timer-bar  { height: 100%; border-radius: 2px; background: #ffd166; transition: width 0.09s linear, background 0.3s; }

/* ミニゲームオーバーレイ */
#miniGamePanel {
  display: none; position: fixed; inset: 0;
  background: rgba(8,8,18,0.95); z-index: 300;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 24px;
}
#miniGamePanel.show { display: flex; }
.mg-box {
  background: #14142a; border: 2px solid #e74c3c;
  border-radius: 14px; padding: 22px 20px;
  width: 320px; max-width: 92vw;
  animation: popIn 0.25s cubic-bezier(.2,1.4,.6,1);
}
.mg-emoji  { font-size: 2.5em; margin-bottom: 8px; }
.mg-title  { font-size: 1.05em; font-weight: bold; color: #e74c3c; margin-bottom: 6px; }
.mg-desc   { font-size: 0.82em; color: #aaa; line-height: 1.6; margin-bottom: 12px; white-space: pre-line; }
.mg-cd     { font-size: 2em; font-weight: bold; color: #e74c3c; margin-bottom: 8px;
             font-variant-numeric: tabular-nums; animation: cdTick2 0.8s ease-in-out infinite alternate; }
@keyframes cdTick2 { to { opacity: 0.4; transform: scale(0.88); } }
.mg-count  { font-size: 1.05em; color: #ffd166; margin-bottom: 8px; min-height: 1.3em; }
.mg-btn {
  width: 100%; padding: 14px; background: #e74c3c; color: #fff;
  border: none; border-radius: 10px; font-size: 1.05em; font-weight: bold;
  cursor: pointer; font-family: inherit;
  animation: mgGlow2 0.5s ease-in-out infinite alternate;
  -webkit-tap-highlight-color: transparent;
}
.mg-btn:active { transform: scale(0.95); }
.mg-btn:disabled { opacity: 0.4; animation: none; cursor: not-allowed; }
@keyframes mgGlow2 { to { box-shadow: 0 0 22px rgba(231,76,60,0.65); } }
.mg-result { font-size: 0.88em; margin-top: 10px; min-height: 1.2em; }

/* ── デスクパネル ── */
.desk-panel { background: #10101e; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
.dp-header { font-size: 0.82em; color: #ffd166; font-weight: bold; margin-bottom: 8px; }
.dp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.dp-item {
  background: #1a1a2e; border: 1.5px solid #2a2a45; border-radius: 10px;
  padding: 9px 5px; cursor: pointer; text-align: center;
  font-family: inherit; color: #eee; position: relative;
  transition: border-color 0.12s;
}
.dp-item:active { transform: scale(0.93); }
.dp-item.ringing   { border-color: #ffd166; animation: dpPulse 0.45s infinite alternate; }
@keyframes dpPulse { to { background: #1e1e10; box-shadow: 0 0 14px rgba(255,209,102,0.5); } }
.dp-item.has-mail  { border-color: #74b9ff; background: #0a101e; }
.dp-item.coffee-rdy{ border-color: #2ecc71; background: #0a150a; }
.dp-item.coffee-on { border-color: #2ecc71; animation: dpBrew 0.6s infinite alternate; }
@keyframes dpBrew  { to { box-shadow: 0 0 14px rgba(46,204,113,0.5); } }
.dp-item.broken    { border-color: #e74c3c; animation: dpBreak 0.3s infinite alternate; }
@keyframes dpBreak { to { background: #150a0a; box-shadow: 0 0 14px rgba(231,76,60,0.5); } }
.dp-icon  { font-size: 1.5em; margin-bottom: 2px; }
.dp-label { font-size: 0.63em; color: #888; margin-bottom: 2px; }
.dp-state { font-size: 0.62em; color: #aaa; min-height: 1em; }
.dp-state.ok   { color: #2ecc71; }
.dp-state.warn { color: #ffd166; }
.dp-state.bad  { color: #e74c3c; }
.dp-badge {
  position: absolute; top: -4px; right: -4px;
  background: #e74c3c; color: #fff; font-size: 0.6em; font-weight: bold;
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="titleScreen">
  <div class="ts-moon">🌙</div>
  <h2>月末の謎残業</h2>
  <p>なぜか仕事が終わらない。<br>謎のイベントが降り続ける。<br>クリックして作業量を稼ぎ、<br>全タスクを21時〜24時以内に終わらせろ！</p>
  <button class="ts-start" onclick="startGame()">⌨️ 残業を開始する</button>
  <div class="ts-hint">💡 アップグレードを買えば自動化できます</div>
</div>

<div class="container">
  <div class="title-area">
    <h1>🌙 月末の謎残業</h1>
    <div class="sub">なぜか仕事が終わらない。謎のイベントが降り続ける。</div>
  </div>

  <!-- ステータス -->
  <div class="status-bar">
    <div class="sb"><div class="sl">残業時間</div><div class="sv red" id="stTime">21:00</div></div>
    <div class="sb"><div class="sl">作業量</div><div class="sv yellow" id="stWork">0</div></div>
    <div class="sb"><div class="sl">謎ポイント</div><div class="sv blue" id="stChaos">0</div></div>
  </div>

  <!-- 進捗ゲージ -->
  <div class="progress-area">
    <div class="pa-header">
      <span class="pa-title" id="paTitle">📋 月末処理</span>
      <span class="pa-pct" id="paPct">0%</span>
    </div>
    <div class="gauge-wrap">
      <div class="gauge-fill" id="gaugeFill" style="width:0%;background:linear-gradient(90deg,#e74c3c,#f39c12)"></div>
    </div>
  </div>

  <!-- 作業エリア -->
  <div class="work-area" id="workArea">
    <span class="desk-emoji" id="deskEmoji">💻</span>
    <div class="task-name" id="taskName">月末集計を処理しています…</div>
    <button class="work-btn" id="workBtn">
      <span class="btn-label">⌨️ 作業する</span>
      <span class="btn-sub" id="workBtnSub">クリックで +1 作業量</span>
    </button>
  </div>

  <!-- デスクパネル -->
  <div class="desk-panel">
    <div class="dp-header">🖥️ デスクパネル</div>
    <div class="dp-grid">
      <button class="dp-item" id="dpPhone" onclick="answerPhone()">
        <div class="dp-icon">📞</div>
        <div class="dp-label">電話</div>
        <div class="dp-state" id="dpPhoneState">待機中</div>
      </button>
      <button class="dp-item" id="dpMail" onclick="clearMail()">
        <div class="dp-icon">📧</div>
        <div class="dp-label">メール</div>
        <div class="dp-state ok" id="dpMailState">0件</div>
      </button>
      <button class="dp-item coffee-rdy" id="dpCoffee" onclick="drinkCoffee()">
        <div class="dp-icon">☕</div>
        <div class="dp-label">コーヒー</div>
        <div class="dp-state ok" id="dpCoffeeState">準備OK！</div>
      </button>
      <button class="dp-item" id="dpPrinter" onclick="fixPrinter()">
        <div class="dp-icon">🖨️</div>
        <div class="dp-label">プリンター</div>
        <div class="dp-state ok" id="dpPrinterState">正常</div>
      </button>
    </div>
  </div>

  <!-- アップグレード -->
  <div class="upgrade-area">
    <h2>⚙️ 強化（作業量で購入）</h2>
    <div class="upgrade-grid" id="upgradeGrid"></div>
  </div>

  <!-- イベントログ -->
  <div class="event-log">
    <h2>📡 謎のログ</h2>
    <div class="log-list" id="logList"></div>
  </div>
</div>

<!-- ミニゲームオーバーレイ -->
<div id="miniGamePanel">
  <div class="mg-box">
    <div class="mg-emoji"  id="mgEmoji"></div>
    <div class="mg-title"  id="mgTitle"></div>
    <div class="mg-desc"   id="mgDesc"></div>
    <div class="mg-cd"     id="mgCd"></div>
    <div class="mg-count"  id="mgCount"></div>
    <button class="mg-btn" id="mgBtn"></button>
    <div class="mg-result" id="mgResult"></div>
  </div>
</div>

<!-- イベントポップアップ -->
<div class="event-popup" id="eventPopup">
  <div class="ep-card">
    <div class="ep-emoji" id="epEmoji">👽</div>
    <div class="ep-title" id="epTitle"></div>
    <div class="ep-desc" id="epDesc"></div>
    <div class="ep-timer-wrap"><div class="ep-timer-bar" id="epTimerBar" style="width:100%"></div></div>
    <div class="ep-choices" id="epChoices"></div>
  </div>
</div>

<!-- 終了画面 -->
<div class="end-screen" id="endScreen">
  <div class="end-card">
    <div class="end-emoji" id="endEmoji">😴</div>
    <div class="end-title" id="endTitle">帰れた…</div>
    <div id="endMsg" style="font-size:0.82em;color:#aaa;margin-bottom:10px;line-height:1.6"></div>
    <div class="end-stats" id="endStats"></div>
    <button class="retry-btn" onclick="location.reload()">🔄 また残業する</button>
  </div>
</div>

<script>
// ============================================================
// ゲーム状態
// ============================================================
let G = {
  work: 0,
  chaos: 0,
  progress: 0,
  targetProgress: 100,
  minute: 0, // 21:00からの経過分
  autoWork: 0,
  clickPower: 1,
  chaosRate: 1,
  upgrades: {},
  taskIdx: 0,
  stage: 0,
  totalClicks: 0,
  totalEvents: 0,
  totalChaos: 0,
  running: false,
  _hint30: false, _hint100: false, _hint300: false,
};

// タスクリスト（ステージ順）
const TASKS = [
  { name: '月末集計を処理中', emoji: '💻', target: 80, color: 'linear-gradient(90deg,#e74c3c,#f39c12)' },
  { name: '謎のExcelファイルを開いている', emoji: '📊', target: 120, color: 'linear-gradient(90deg,#3498db,#2ecc71)' },
  { name: '上司に送るメールを推敲中', emoji: '📧', target: 100, color: 'linear-gradient(90deg,#9b59b6,#e74c3c)' },
  { name: '誰かが間違えた発注書を修正中', emoji: '📝', target: 150, color: 'linear-gradient(90deg,#f39c12,#ffd166)' },
  { name: '存在しないはずのプロジェクトを対応中', emoji: '👻', target: 180, color: 'linear-gradient(90deg,#a78bfa,#3498db)' },
  { name: '宇宙人からの問い合わせに対応中', emoji: '👽', target: 200, color: 'linear-gradient(90deg,#00cec9,#a78bfa)' },
  { name: '次元の狭間から届いた書類を処理中', emoji: '🌀', target: 250, color: 'linear-gradient(90deg,#e17055,#ffd166)' },
];

// アップグレード定義
const UPGRADES = [
  { id: 'coffee',   name: '☕ コーヒー補給',  desc: 'クリック+2',      cost: 30,  max: 5,  effect: () => { G.clickPower += 2; } },
  { id: 'auto',     name: '🤖 自動化スクリプト', desc: '自動+1/秒',    cost: 80,  max: 5,  effect: () => { G.autoWork += 1; } },
  { id: 'focus',    name: '🎧 集中モード',    desc: 'クリック+5',      cost: 150, max: 3,  effect: () => { G.clickPower += 5; } },
  { id: 'macro',    name: '⚡ マクロ設定',    desc: '自動+3/秒',       cost: 300, max: 3,  effect: () => { G.autoWork += 3; } },
  { id: 'prayer',   name: '🙏 神頼み',        desc: '謎イベント減少',   cost: 200, max: 2,  effect: () => { G.chaosRate = Math.max(0.3, G.chaosRate - 0.3); } },
  { id: 'overtime', name: '💪 残業手当',      desc: 'クリック+10',     cost: 500, max: 2,  effect: () => { G.clickPower += 10; } },
  { id: 'ai',       name: '🧠 AIに丸投げ',   desc: '自動+10/秒',      cost: 800, max: 2,  effect: () => { G.autoWork += 10; } },
  { id: 'resign',   name: '📄 退職届を準備',  desc: '謎ポイント+50',   cost: 400, max: 1,  effect: () => { G.chaos += 50; } },
];

// 謎イベント30種

const DESK = {
  phoneTimer:     30 + Math.random() * 20,
  phoneRinging:   false,
  phoneRingLeft:  0,
  mailCount:      0,
  mailTimer:      25 + Math.random() * 10,
  coffeeReady:    true,
  coffeeCd:       0,
  coffeeBoostLeft:0,
  printerOk:      true,
  printerTimer:   60 + Math.random() * 30,
  printerAlertLeft: 0,
};

function renderDesk() {
  // Phone
  const phoneBtn = document.getElementById('dpPhone');
  const phoneSt  = document.getElementById('dpPhoneState');
  if (DESK.phoneRinging) {
    phoneBtn.className = 'dp-item ringing';
    phoneSt.textContent = `📳 ${Math.ceil(DESK.phoneRingLeft)}秒！`;
    phoneSt.className = 'dp-state warn';
  } else {
    phoneBtn.className = 'dp-item';
    phoneSt.textContent = '待機中';
    phoneSt.className = 'dp-state';
  }

  // Mail
  const mailBtn = document.getElementById('dpMail');
  const mailSt  = document.getElementById('dpMailState');
  let mailBadge = mailBtn.querySelector('.dp-badge');
  mailBtn.className = 'dp-item' + (DESK.mailCount > 0 ? ' has-mail' : '');
  mailSt.textContent = DESK.mailCount > 0 ? `未読 ${DESK.mailCount}件` : '0件';
  mailSt.className = 'dp-state' + (DESK.mailCount >= 4 ? ' bad' : DESK.mailCount > 0 ? ' warn' : ' ok');
  if (DESK.mailCount > 0) {
    if (!mailBadge) { mailBadge = document.createElement('div'); mailBadge.className = 'dp-badge'; mailBtn.appendChild(mailBadge); }
    mailBadge.textContent = DESK.mailCount;
  } else if (mailBadge) { mailBadge.remove(); }

  // Coffee
  const coffeeBtn = document.getElementById('dpCoffee');
  const coffeeSt  = document.getElementById('dpCoffeeState');
  if (DESK.coffeeBoostLeft > 0) {
    coffeeBtn.className = 'dp-item coffee-on';
    coffeeSt.textContent = `効果中 ${Math.ceil(DESK.coffeeBoostLeft)}秒`;
    coffeeSt.className = 'dp-state ok';
  } else if (DESK.coffeeReady) {
    coffeeBtn.className = 'dp-item coffee-rdy';
    coffeeSt.textContent = '準備OK！';
    coffeeSt.className = 'dp-state ok';
  } else {
    coffeeBtn.className = 'dp-item';
    coffeeSt.textContent = `CD ${Math.ceil(DESK.coffeeCd)}秒`;
    coffeeSt.className = 'dp-state';
  }

  // Printer
  const printerBtn = document.getElementById('dpPrinter');
  const printerSt  = document.getElementById('dpPrinterState');
  if (!DESK.printerOk) {
    printerBtn.className = 'dp-item broken';
    printerSt.textContent = DESK.printerAlertLeft > 0 ? `⚠ ${Math.ceil(DESK.printerAlertLeft)}秒` : '故障中！修理して';
    printerSt.className = 'dp-state bad';
  } else {
    printerBtn.className = 'dp-item';
    printerSt.textContent = '正常';
    printerSt.className = 'dp-state ok';
  }
}

function answerPhone() {
  if (!DESK.phoneRinging) return;
  DESK.phoneRinging = false;
  DESK.phoneRingLeft = 0;
  G.work += 20;
  G.chaos += 10;
  addLog('📞 電話に出た！謎のボーナス！ +20作業量', 'good');
  playDeskSound(660, 'sine', 0.15);
}

function clearMail() {
  if (DESK.mailCount === 0) return;
  const bonus = DESK.mailCount * 5;
  G.work += bonus;
  addLog(`📧 ${DESK.mailCount}件のメールを処理した。+${bonus}作業量`, 'good');
  DESK.mailCount = 0;
  playDeskSound(440, 'triangle', 0.1);
}

function drinkCoffee() {
  if (!DESK.coffeeReady || DESK.coffeeBoostLeft > 0) return;
  DESK.coffeeReady = false;
  DESK.coffeeCd = 40;
  DESK.coffeeBoostLeft = 12;
  G.clickPower += 5;
  addLog('☕ コーヒーを飲んだ！クリック+5（12秒）', 'good');
  playDeskSound(330, 'sine', 0.12);
}

function fixPrinter() {
  if (DESK.printerOk) return;
  DESK.printerOk = true;
  DESK.printerAlertLeft = 0;
  G.autoWork += 5;
  addLog('🖨️ プリンターを修理した！自動作業が回復！', 'good');
  playDeskSound(220, 'sawtooth', 0.08);
}

function playDeskSound(freq, type, vol) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.18);
  } catch(e) {}
}

function renderUpgrades() {
  const grid = document.getElementById('upgradeGrid');
  grid.innerHTML = '';
  UPGRADES.forEach(u => {
    const count = G.upgrades[u.id] || 0;
    const maxed = count >= u.max;
    const canBuy = G.work >= u.cost && !maxed;
    const btn = document.createElement('div');
    btn.className = 'upg-btn' + (maxed ? ' maxed' : !canBuy ? ' disabled' : '');
    btn.innerHTML = `
      <div class="upg-name">${u.name}${count > 0 ? ` (${count}/${u.max})` : ''}</div>
      <div class="upg-desc">${u.desc}</div>
      <div class="upg-cost ${canBuy ? '' : 'cant'}">${maxed ? '✅ MAX' : `💰 ${u.cost}`}</div>
    `;
    if (canBuy) {
      btn.addEventListener('click', () => {
        G.work -= u.cost;
        G.upgrades[u.id] = (G.upgrades[u.id] || 0) + 1;
        u.effect();
        addLog(`「${u.name}」を購入した！`, 'good');
        renderUpgrades();
        updateHUD();
      });
    }
    grid.appendChild(btn);
  });
}

// ============================================================
// ログ
// ============================================================
function addLog(text, type = 'new') {
  const list = document.getElementById('logList');
  const prev = list.querySelectorAll('.log-item');
  prev.forEach(el => { el.classList.remove('new'); el.classList.add(''); });
  const div = document.createElement('div');
  div.className = `log-item ${type}`;
  const time = `${21 + Math.floor(G.minute / 60)}:${(G.minute % 60).toString().padStart(2,'0')}`;
  div.textContent = `[${time}] ${text}`;
  list.insertBefore(div, list.firstChild);
  while (list.children.length > 20) list.removeChild(list.lastChild);
}

// ============================================================
// イベント表示（7秒タイマー付き）
// ============================================================
let eventChoiceTimer = null;
const EVENT_TIMEOUT = 7;

function closeEventPopup(ch) {
  if (eventChoiceTimer) { clearInterval(eventChoiceTimer); eventChoiceTimer = null; }
  ch.fx(G);
  document.getElementById('eventPopup').classList.remove('show');
  G.running = true;
  updateHUD();
  renderUpgrades();
}

function showEvent(ev) {
  G.running = false;
  G.totalEvents++;
  playEventSound();
  document.getElementById('epEmoji').textContent = ev.emoji;
  document.getElementById('epTitle').textContent = ev.title;
  document.getElementById('epDesc').textContent = ev.desc;

  const timerBar = document.getElementById('epTimerBar');
  timerBar.style.width = '100%';
  timerBar.style.background = '#ffd166';
  timerBar.style.transition = 'none';

  const choices = document.getElementById('epChoices');
  choices.innerHTML = '';
  ev.choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'ep-btn';
    btn.innerHTML = `<span>${ch.label}</span><span class="ep-hint">${ch.hint}</span>`;
    btn.addEventListener('click', () => closeEventPopup(ch));
    choices.appendChild(btn);
  });
  document.getElementById('eventPopup').classList.add('show');

  // 7秒カウントダウン
  if (eventChoiceTimer) clearInterval(eventChoiceTimer);
  let timeLeft = EVENT_TIMEOUT;
  eventChoiceTimer = setInterval(() => {
    timeLeft -= 0.1;
    const pct = Math.max(0, (timeLeft / EVENT_TIMEOUT) * 100);
    timerBar.style.transition = 'none';
    timerBar.style.width = pct + '%';
    timerBar.style.background = pct < 30 ? '#e74c3c' : pct < 60 ? '#f39c12' : '#ffd166';
    if (timeLeft <= 0) {
      clearInterval(eventChoiceTimer);
      eventChoiceTimer = null;
      // タイムアウト → 最悪の選択肢（最後）を自動実行
      const lastCh = ev.choices[ev.choices.length - 1];
      lastCh.fx(G);
      addLog('⏱ 7秒タイムアウト！最悪の選択が自動実行された…', 'bad');
      document.getElementById('eventPopup').classList.remove('show');
      G.running = true;
      updateHUD();
      renderUpgrades();
    }
  }, 100);
}

// ============================================================
// ミニゲームシステム
// ============================================================
let miniGameActive = false;

const MINI_GAMES = [
  {
    emoji: '💥', title: '緊急事態！連打で守れ！',
    desc: '3秒間連打して作業量を守れ！\n失敗すると作業量が半減する！',
    btnLabel: '⌨️ 連打！', secs: 3, type: 'mash', threshold: 10,
    onSuccess: (n) => { addLog(`💪 ${n}回連打！危機を乗り越えた！`, 'good'); },
    onFail:    ()  => { G.work = Math.floor(G.work / 2); addLog('💀 失敗…作業量が半減した', 'bad'); },
  },
  {
    emoji: '⏰', title: 'ゼロになる瞬間に押せ！',
    desc: 'カウントダウンが0になった\nその瞬間にボタンを押せ！\n外すと進捗が半減する！',
    btnLabel: '🎯 今だ！', secs: 3, type: 'timing', window: 0.6,
    onSuccess: ()  => { G.progress += 20; addLog('🎯 完璧なタイミング！進捗+20！', 'good'); },
    onFail:    ()  => { G.progress = Math.floor(G.progress / 2); addLog('⚡ タイミングが外れた…進捗半減', 'bad'); },
  },
  {
    emoji: '🚨', title: '緊急！バグ修正連打！',
    desc: '本番でバグが発生！\n4秒間連打してロールバックせよ！\n失敗で自動作業量が半減！',
    btnLabel: '🔧 修正！', secs: 4, type: 'mash', threshold: 15,
    onSuccess: (n) => { addLog(`✅ ${n}回連打でバグ修正成功！`, 'good'); G.progress += 10; },
    onFail:    ()  => { G.autoWork = Math.max(0, G.autoWork / 2); addLog('💀 ロールバック失敗…自動作業半減', 'bad'); },
  },
];

function triggerMiniGame() {
  if (miniGameActive || !G.running) return;
  miniGameActive = true;
  G.running = false;

  const mg = MINI_GAMES[Math.floor(Math.random() * MINI_GAMES.length)];
  const panel  = document.getElementById('miniGamePanel');
  const mgEmoji= document.getElementById('mgEmoji');
  const mgTitle= document.getElementById('mgTitle');
  const mgDesc = document.getElementById('mgDesc');
  const mgCd   = document.getElementById('mgCd');
  const mgCount= document.getElementById('mgCount');
  const mgBtn  = document.getElementById('mgBtn');
  const mgResult=document.getElementById('mgResult');

  mgEmoji.textContent = mg.emoji;
  mgTitle.textContent = mg.title;
  mgDesc.textContent  = mg.desc;
  mgCd.textContent    = mg.secs;
  mgCount.textContent = '';
  mgBtn.textContent   = mg.btnLabel;
  mgBtn.disabled      = false;
  mgResult.textContent= '';
  panel.classList.add('show');
  playEventSound();

  let timeLeft = mg.secs;
  let done = false;

  function closeMiniGame() {
    panel.classList.remove('show');
    miniGameActive = false;
    G.running = true;
    updateHUD();
  }

  if (mg.type === 'mash') {
    let clicks = 0;
    // Fresh listener each time
    const handler = () => { if (!done) { clicks++; mgCount.textContent = clicks + ' 回'; } };
    mgBtn.onclick = handler;

    const timer = setInterval(() => {
      timeLeft -= 0.1;
      mgCd.textContent = Math.ceil(timeLeft);
      if (timeLeft <= 0) {
        clearInterval(timer);
        done = true;
        mgBtn.disabled = true;
        const success = clicks >= mg.threshold;
        mgResult.textContent = success ? `✅ ${clicks}回！成功！` : `😱 ${clicks}回…失敗！`;
        mgResult.style.color = success ? '#2ecc71' : '#e74c3c';
        if (success) mg.onSuccess(clicks); else mg.onFail();
        setTimeout(closeMiniGame, 900);
      }
    }, 100);

  } else if (mg.type === 'timing') {
    const startTime = Date.now();
    const totalMs = mg.secs * 1000;

    const timer = setInterval(() => {
      timeLeft -= 0.1;
      mgCd.textContent = timeLeft > 0 ? timeLeft.toFixed(1) : '0.0';
      if (timeLeft <= -0.5) {
        clearInterval(timer);
        if (!done) {
          done = true;
          mgBtn.disabled = true;
          mgResult.textContent = '😱 遅かった！';
          mgResult.style.color = '#e74c3c';
          mg.onFail();
          setTimeout(closeMiniGame, 900);
        }
      }
    }, 100);

    mgBtn.onclick = () => {
      if (done) return;
      done = true;
      clearInterval(timer);
      const elapsed = (Date.now() - startTime) / 1000;
      const error = Math.abs(elapsed - mg.secs);
      const success = error <= mg.window;
      mgBtn.disabled = true;
      mgResult.textContent = success
        ? `✅ 完璧！(誤差 ${(error*1000).toFixed(0)}ms)`
        : `😱 外れた (誤差 ${(error*1000).toFixed(0)}ms)`;
      mgResult.style.color = success ? '#2ecc71' : '#e74c3c';
      if (success) mg.onSuccess(); else mg.onFail();
      setTimeout(closeMiniGame, 900);
    };
  }
}

function updateHUD() {
  const h = 21 + Math.floor(G.minute / 60);
  const m = G.minute % 60;
  document.getElementById('stTime').textContent = `${h}:${m.toString().padStart(2,'0')}`;
  document.getElementById('stWork').textContent = Math.floor(G.work);
  document.getElementById('stChaos').textContent = Math.floor(G.chaos);

  const task = TASKS[Math.min(G.stage, TASKS.length - 1)];
  const pct = Math.min(100, (G.progress / task.target) * 100);
  document.getElementById('paPct').textContent = Math.floor(pct) + '%';
  document.getElementById('gaugeFill').style.width = pct + '%';
  document.getElementById('gaugeFill').style.background = task.color;
  document.getElementById('paTitle').textContent = '📋 ' + task.name;
  document.getElementById('deskEmoji').textContent = task.emoji;
  document.getElementById('taskName').textContent = task.name + '…';
  document.getElementById('workBtnSub').textContent = `クリックで +${G.clickPower} 作業量 / 自動 +${G.autoWork.toFixed(1)}/秒`;
}

// ============================================================
// ゲームループ
// ============================================================
let lastTick = Date.now();
let eventTimer = 15 + Math.random() * 10;
let miniGameTimer = 50 + Math.random() * 30;

// デスクタイマー（G.runningに関係なく常時動く）
function updateDeskTimers(dt) {
  // 電話
  if (!DESK.phoneRinging) {
    DESK.phoneTimer -= dt;
    if (DESK.phoneTimer <= 0) {
      DESK.phoneRinging = true;
      DESK.phoneRingLeft = 5;
      DESK.phoneTimer = 25 + Math.random() * 20;
      addLog('📞 電話が鳴っている！4秒以内に出て！', 'chaos');
      playDeskSound(880, 'square', 0.06);
    }
  } else {
    DESK.phoneRingLeft -= dt;
    if (DESK.phoneRingLeft <= 0) {
      DESK.phoneRinging = false;
      G.minute += 8;
      addLog('📞 電話を逃した…残業+8分ペナルティ！', 'bad');
    }
  }

  // メール
  DESK.mailTimer -= dt;
  if (DESK.mailTimer <= 0 && DESK.mailCount < 5) {
    DESK.mailCount++;
    DESK.mailTimer = 15 + Math.random() * 10;
    if (DESK.mailCount >= 4) addLog(`📧 未読${DESK.mailCount}件！自動作業-${(DESK.mailCount*0.4).toFixed(1)}/秒のペナルティ！`, 'bad');
    else addLog(`📧 新着メール（未読${DESK.mailCount}件）`, 'chaos');
  }

  // コーヒーCD
  if (!DESK.coffeeReady && DESK.coffeeBoostLeft <= 0) {
    DESK.coffeeCd -= dt;
    if (DESK.coffeeCd <= 0) { DESK.coffeeReady = true; addLog('☕ コーヒーが準備できた！クリックしてパワーUP！', 'good'); }
  }
  if (DESK.coffeeBoostLeft > 0) {
    DESK.coffeeBoostLeft -= dt;
    if (DESK.coffeeBoostLeft <= 0) {
      DESK.coffeeBoostLeft = 0;
      G.clickPower = Math.max(1, G.clickPower - 5);
      addLog('☕ コーヒーの効果が切れた', 'chaos');
    }
  }

  // プリンター
  if (DESK.printerOk) {
    DESK.printerTimer -= dt;
    if (DESK.printerTimer <= 0) {
      DESK.printerOk = false;
      DESK.printerAlertLeft = 10;
      DESK.printerTimer = 55 + Math.random() * 30;
      G.autoWork = Math.max(0, G.autoWork - 5);
      addLog('🖨️ プリンターが壊れた！今すぐ🖨️を押して修理！自動作業-5！', 'bad');
      playDeskSound(120, 'sawtooth', 0.1);
    }
  } else if (DESK.printerAlertLeft > 0) {
    DESK.printerAlertLeft -= dt;
    if (DESK.printerAlertLeft <= 0) {
      DESK.printerAlertLeft = 0;
      addLog('🖨️ 修理チャンス終了…いつでも🖨️を押せば直ります', 'bad');
    }
  }
}

function tick() {
  const now = Date.now();
  const dt = Math.min(0.15, (now - lastTick) / 1000);
  lastTick = now;

  // デスクは常時更新（イベント中でも電話が鳴る！）
  updateDeskTimers(dt);
  renderDesk();

  if (!G.running) { requestAnimationFrame(tick); return; }

  // 自動作業（メール未読ペナルティ込み）
  const _mailPen = DESK.mailCount * 0.4;
  const _effAuto = Math.max(0, G.autoWork - _mailPen);
  G.work += _effAuto * dt;
  G.progress += _effAuto * dt * 0.5;
  G.minute += dt * 0.5;

  // 作業量マイルストーン通知
  if (!G._hint30  && G.work >= 30)  { G._hint30=true;  addLog('💡 作業量30！⚙️アップグレードを購入できます！', 'good'); }
  if (!G._hint100 && G.work >= 100) { G._hint100=true; addLog('💰 作業量100達成！強化に使おう！', 'good'); }
  if (!G._hint300 && G.work >= 300) { G._hint300=true; addLog('🔥 作業量300！あなたは謎の強者です', 'chaos'); }

  // カオス度が高まると残業時間が加速
  if (G.chaos >= 200) G.minute += dt * 0.2;
  if (G.chaos >= 400) G.minute += dt * 0.3;

  // ミニゲームタイマー（50〜80秒間隔）
  miniGameTimer -= dt;
  if (miniGameTimer <= 0) {
    miniGameTimer = 50 + Math.random() * 30;
    triggerMiniGame();
  }

  // イベントタイマー
  eventTimer -= dt * G.chaosRate;
  if (eventTimer <= 0) {
    eventTimer = (10 + Math.random() * 15) / G.chaosRate;
    const ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
    showEvent(ev);
    G.totalChaos++;
  }

  // タスク完了チェック
  const task = TASKS[Math.min(G.stage, TASKS.length - 1)];
  if (G.progress >= task.target) {
    G.progress = 0;
    G.stage++;
    addLog(`「${task.name}」完了！`, 'good');
    playLevelUp();

    if (G.stage >= TASKS.length) {
      endGame(true);
      return;
    }

    const nextTask = TASKS[G.stage];
    addLog(`次のタスク：「${nextTask.name}」`, 'chaos');
  }

  // ゲームオーバーチェック（残業3時間超）
  if (G.minute >= 180) {
    endGame(false);
    return;
  }

  updateHUD();
  renderUpgrades();
  requestAnimationFrame(tick);
}

// ============================================================
// クリック処理
// ============================================================
document.getElementById('workBtn').addEventListener('click', function(e) {
  if (!G.running) return;
  playWorkClick();
  G.work += G.clickPower;
  G.progress += G.clickPower * 0.5;
  G.totalClicks++;

  // クリックエフェクト
  const fx = document.createElement('div');
  fx.className = 'click-fx';
  fx.textContent = `+${G.clickPower}`;
  fx.style.left = (30 + Math.random() * 40) + '%';
  fx.style.top = '50%';
  document.getElementById('workArea').appendChild(fx);
  setTimeout(() => fx.remove(), 800);

  updateHUD();
});

// ============================================================
// ゲーム終了
// ============================================================
function endGame(win) {
  G.running = false;
  const screen = document.getElementById('endScreen');
  screen.classList.add('show');

  const h = 21 + Math.floor(G.minute / 60);
  const m = (G.minute % 60).toString().padStart(2, '0');

  if (win) {
    document.getElementById('endEmoji').textContent = '🎉';
    document.getElementById('endTitle').textContent = '全タスク完了！！';
    document.getElementById('endMsg').textContent = `${h}:${m}に全ての謎の仕事が終わった。誰も感謝しない。でも君は帰れる。`;
  } else {
    document.getElementById('endEmoji').textContent = '💀';
    document.getElementById('endTitle').textContent = '機会損失…';
    document.getElementById('endMsg').textContent = `${h}:${m}。残業3時間を超えてしまった。タクシーで帰ることになった。`;
  }

  document.getElementById('endStats').innerHTML = [
    ['総クリック数', G.totalClicks + '回'],
    ['遭遇イベント', G.totalEvents + '件'],
    ['謎ポイント', Math.floor(G.chaos) + 'pt'],
    ['完了タスク', G.stage + '/' + TASKS.length],
    ['購入アップグレード', Object.values(G.upgrades).reduce((a,b)=>a+b,0) + '個'],
    ['クリック威力', G.clickPower + ''],
  ].map(([l, v]) => `<div class="es"><div class="el">${l}</div><div class="ev">${v}</div></div>`).join('');
}

// ============================================================
// 効果音
// ============================================================
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playWorkClick() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(520, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(380, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.09, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}
function playEventSound() {
  try {
    const ctx = getAudioCtx();
    [0, 0.08, 0.16].forEach((delay, i) => {
      const freqs = [300, 450, 600];
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freqs[i], ctx.currentTime + delay);
      gain.gain.setValueAtTime(0.07, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.18);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.18);
    });
  } catch(e) {}
}
function playLevelUp() {
  try {
    const ctx = getAudioCtx();
    [440, 554, 659, 880].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.2);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.2);
    });
  } catch(e) {}
}
