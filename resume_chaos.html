<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘘つき履歴書ジェネレーター CHAOS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0a0a16;
  color: #eee;
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 8px 60px;
}

.container { width: 440px; max-width: 98vw; }

/* タイトル画面 */
#titleScreen {
  position: fixed; inset: 0;
  background: #0a0a16;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 4000; padding: 24px; text-align: center;
  transition: opacity 0.5s;
}
#titleScreen .ts-emoji { font-size: 4em; margin-bottom: 10px; animation: tsPulse 2.5s ease-in-out infinite; }
@keyframes tsPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
#titleScreen h2 { font-size: 1.4em; color: #ffd166; margin-bottom: 8px; line-height: 1.5; }
#titleScreen p { color: #555; font-size: 0.88em; line-height: 1.8; max-width: 280px; margin: 0 0 6px; }
.ts-btn {
  margin-top: 26px; padding: 15px 42px;
  background: #ffd166; color: #0a0a16;
  border: none; border-radius: 10px;
  font-size: 1.1em; font-weight: bold;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,209,102,0.3);
  transition: transform 0.1s;
}
.ts-btn:active { transform: scale(0.96); }
.ts-hint { margin-top: 16px; font-size: 0.72em; color: #333; }

/* ローディングオーバーレイ */
#loadingOverlay {
  position: fixed; inset: 0;
  background: rgba(10,10,22,0.88);
  display: none; align-items: center; justify-content: center;
  z-index: 3000; flex-direction: column; gap: 14px;
}
#loadingOverlay.show { display: flex; }
.lo-dots { display: flex; gap: 10px; }
.lo-dot {
  width: 12px; height: 12px;
  background: #ffd166; border-radius: 50%;
  animation: loDot 0.7s ease-in-out infinite;
}
.lo-dot:nth-child(2){ animation-delay: 0.15s; }
.lo-dot:nth-child(3){ animation-delay: 0.30s; }
@keyframes loDot { 0%,100%{transform:translateY(0);opacity:0.3} 50%{transform:translateY(-10px);opacity:1} }
.lo-text { color: #888; font-size: 0.88em; }

/* タイトル */
.title-area { text-align: center; margin: 12px 0 20px; }
.title-area h1 { font-size: 1.3em; color: #ffd166; margin-bottom: 4px; }
.title-area .sub { color: #555; font-size: 0.8em; }

/* アンケート画面 */
.quiz-box {
  background: #14142a;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
}
.quiz-progress {
  display: flex; gap: 6px; margin-bottom: 16px;
}
.qp-dot {
  flex: 1; height: 4px; border-radius: 4px; background: #2a2a45;
  transition: background 0.3s;
}
.qp-dot.done { background: #ffd166; }
.qp-dot.active { background: #f39c12; }

.q-num { font-size: 0.75em; color: #666; margin-bottom: 6px; }
.q-text { font-size: 1em; font-weight: bold; margin-bottom: 16px; line-height: 1.5; min-height: 2.5em; }

.q-choices { display: flex; flex-direction: column; gap: 8px; }
.q-choice {
  padding: 12px 14px;
  background: #1e1e38;
  border: 1.5px solid #2a2a50;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.88em;
  line-height: 1.4;
  transition: all 0.15s;
  text-align: left;
}
.q-choice:hover { border-color: #ffd166; background: #25253d; }
.q-choice.selected { border-color: #ffd166; background: #2a2a40; }

/* 入力フォーム */
.form-box {
  background: #14142a;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 12px;
}
.form-box h2 { font-size: 0.88em; color: #ffd166; margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.form-row { margin-bottom: 8px; }
.form-row label { font-size: 0.75em; color: #666; display: block; margin-bottom: 4px; }
.form-row input, .form-row select {
  width: 100%; padding: 10px 12px;
  background: #1e1e38; border: 1px solid #2a2a50;
  border-radius: 8px; color: #eee; font-size: 0.88em;
}
.form-row input::placeholder { color: #444; }

.gen-btn {
  width: 100%; padding: 14px;
  background: #ffd166; color: #0a0a16;
  border: none; border-radius: 10px;
  font-size: 1.05em; font-weight: bold;
  cursor: pointer; margin-top: 8px;
  transition: transform 0.1s;
}
.gen-btn:active { transform: scale(0.98); }

/* 性格タイプ結果 */
.type-result {
  background: #14142a;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 12px;
  text-align: center;
  display: none;
  border: 1.5px solid #2a2a50;
}
.type-result.show { display: block; }
.type-mascot { margin: 0 auto 10px; }
.type-name { font-size: 1.2em; font-weight: bold; color: #ffd166; margin-bottom: 4px; }
.type-desc { font-size: 0.82em; color: #aaa; line-height: 1.6; }
.type-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 8px; }
.type-tag {
  font-size: 0.72em; padding: 3px 10px;
  border-radius: 20px; background: #2a2a45;
  color: #aaa; border: 1px solid #3a3a60;
}

/* 盛り度 */
.bs-meter {
  background: #14142a;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 12px;
  display: none;
}
.bs-meter.show { display: block; }
.bs-label { font-size: 0.75em; color: #666; margin-bottom: 6px; }
.bs-bar-wrap { height: 12px; background: #0a0a16; border-radius: 8px; overflow: hidden; }
.bs-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 1.2s ease;
  background: linear-gradient(90deg, #2ecc71 0%, #f39c12 50%, #e74c3c 100%);
}
.bs-comment { font-size: 0.78em; color: #ffd166; margin-top: 6px; }

/* アクション */
.action-row { display: flex; gap: 8px; margin-bottom: 12px; display: none; }
.action-row.show { display: flex; }
.copy-btn, .regen-btn, .reset-btn {
  flex: 1; padding: 11px;
  border: none; border-radius: 8px;
  font-size: 0.82em; cursor: pointer; font-weight: bold;
}
.copy-btn { background: #2ecc71; color: #fff; }
.regen-btn { background: #3498db; color: #fff; }
.reset-btn { background: #444; color: #eee; }

/* 履歴書 */
.resume-box {
  background: #fffdf6;
  color: #111;
  border-radius: 12px;
  padding: 22px 20px;
  margin-bottom: 12px;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  display: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
.resume-box.show { display: block; }
.resume-header {
  text-align: center;
  border-bottom: 2px solid #333;
  padding-bottom: 12px; margin-bottom: 14px;
}
.resume-header h2 { font-size: 1.25em; letter-spacing: 0.3em; margin-bottom: 4px; }
.resume-header .date { font-size: 0.78em; color: #777; }
.resume-name-block { margin: 8px 0 4px; }
.resume-name { font-size: 1.05em; font-weight: bold; }
.resume-meta { font-size: 0.75em; color: #777; margin-top: 2px; }
.rs { margin-bottom: 14px; }
.rs h3 {
  font-size: 0.8em;
  background: #14142a; color: #ffd166;
  padding: 4px 10px; border-radius: 4px;
  margin-bottom: 8px;
  font-family: 'Hiragino Sans', sans-serif;
}
.ri {
  display: flex; gap: 10px;
  font-size: 0.8em; margin-bottom: 6px;
  padding-bottom: 5px; border-bottom: 1px dashed #e0e0d8;
  line-height: 1.5;
}
.ri .yr { color: #999; min-width: 55px; font-size: 0.9em; }
.ri .ct { flex: 1; }
.ri .ct .og { font-weight: bold; }
.ri .ct .dt { color: #666; font-size: 0.9em; margin-top: 1px; }
.pr-box {
  background: #f9f6ee; border: 1px solid #ddd;
  border-radius: 6px; padding: 10px 12px;
  font-size: 0.8em; line-height: 1.8; color: #333;
}
.skill-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.skill-tag {
  background: #eee; border-radius: 4px;
  padding: 3px 8px; font-size: 0.76em; color: #444;
}
.skill-tag.fake { background: #ffe0e0; color: #c00; }
.bs-badge {
  font-size: 0.75em; color: #e74c3c;
  background: #ffe0e0; border-radius: 4px;
  padding: 2px 8px; display: inline-block; margin-bottom: 8px;
}
.type-stamp {
  display: inline-block;
  border: 3px solid #c0392b;
  color: #c0392b;
  border-radius: 8px;
  padding: 4px 12px;
  font-size: 0.8em;
  font-weight: bold;
  transform: rotate(-8deg);
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #2ecc71; color: #fff;
  padding: 10px 20px; border-radius: 8px;
  font-size: 0.88em; opacity: 0; transition: all 0.3s; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== AI対決 ===== */
.ai-battle {
  background: #0e0e22; border: 1.5px solid rgba(231,76,60,0.35);
  border-radius: 14px; padding: 18px; margin-bottom: 12px; display: none;
}
.ai-battle.show { display: block; }
.aib-header { text-align: center; margin-bottom: 16px; }
.aib-title { font-size: 1.1em; font-weight: bold; color: #e74c3c; letter-spacing: 0.04em; }
.aib-sub   { font-size: 0.76em; color: #555; margin-top: 4px; }
.aib-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.aib-card  { background: #14142a; border-radius: 10px; padding: 11px 10px; }
.aib-card-you { border: 1.5px solid rgba(255,209,102,0.5); }
.aib-card-ai  { border: 1.5px solid rgba(231,76,60,0.5); }
.aib-card-lbl { font-size: 0.7em; color: #555; margin-bottom: 5px; }
.aib-card-name { font-size: 0.82em; font-weight: bold; color: #eee; margin-bottom: 8px; min-height: 2em; line-height: 1.4; }
.aib-bar-wrap2 { height: 8px; background: #0a0a16; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.aib-bar-fill2 { height: 100%; border-radius: 4px; transition: width 1.4s ease; }
.aib-bar-you   { background: linear-gradient(90deg, #f39c12, #ffd166); }
.aib-bar-ai    { background: linear-gradient(90deg, #c0392b, #e74c3c); }
.aib-card-score { font-size: 1.5em; font-weight: bold; text-align: center; }
.aib-card-you .aib-card-score { color: #ffd166; }
.aib-card-ai  .aib-card-score { color: #e74c3c; }
.aib-ai-entries {
  font-size: 0.74em; line-height: 1.9; color: #777;
  border-top: 1px solid #1e1e38; padding-top: 10px; margin-bottom: 12px;
}
.aib-ai-entries .e-title { color: #e74c3c; font-weight: bold; margin-bottom: 4px; }
.aib-ai-entries .e-ach   { color: #a78bfa; }
.aib-ai-entries .e-pr    { color: #74b9ff; font-style: italic; }
.aib-verdict {
  text-align: center; padding: 14px; border-radius: 10px;
  background: #0a0a16; border: 1.5px solid #2a2a50;
}
.aib-verdict-emoji { font-size: 2em; margin-bottom: 6px; }
.aib-verdict-title { font-size: 0.95em; font-weight: bold; color: #ffd166; }
.aib-verdict-sub   { font-size: 0.76em; color: #555; margin-top: 4px; }
.aib-rematch {
  width: 100%; margin-top: 10px; padding: 11px;
  background: #14122a; color: #a78bfa;
  border: 1px solid #3a2a60; border-radius: 8px;
  cursor: pointer; font-size: 0.88em; font-family: inherit;
  transition: border-color 0.2s;
}
.aib-rematch:hover { border-color: #a78bfa; }

/* ===== バレ度メーター ===== */
#bareDeg {
  background: #14142a; border-radius: 10px;
  padding: 12px 16px; margin-bottom: 12px; display: none;
  border: 1px solid #2a2a50;
}
#bareDeg.show { display: block; }
.bd-label { font-size: 0.78em; color: #e74c3c; font-weight: bold; margin-bottom: 6px; letter-spacing: 0.04em; }
.bd-bar-wrap { height: 12px; background: #0a0a16; border-radius: 8px; overflow: hidden; }
.bd-bar-fill {
  height: 100%; border-radius: 8px;
  transition: width 1.4s ease;
  background: linear-gradient(90deg, #2ecc71, #f39c12, #e74c3c);
}
.bd-comment { font-size: 0.8em; color: #ffd166; margin-top: 6px; }

/* ===== 面接オーバーレイ ===== */
#interviewPanel {
  display: none; position: fixed; inset: 0;
  background: rgba(4,2,14,0.94); z-index: 3600;
  flex-direction: column; align-items: center; justify-content: center; padding: 20px;
}
#interviewPanel.show { display: flex; }
.iv-box {
  background: #10101e; border: 1.5px solid #2a2a50;
  border-radius: 16px; padding: 22px 20px;
  width: 380px; max-width: 96vw;
}
.iv-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.iv-interviewer { font-size: 1.2em; font-weight: bold; color: #ffd166; }
.iv-qcount { font-size: 0.75em; color: #555; }
.iv-divider { height: 1px; background: #2a2a50; margin-bottom: 14px; }
.iv-question {
  font-size: 0.95em; line-height: 1.7; color: #ddd;
  margin-bottom: 16px; min-height: 3em;
}
.iv-choices { display: flex; flex-direction: column; gap: 8px; }
.iv-choice {
  padding: 13px 14px; background: #1e1e38;
  border: 1.5px solid #2a2a50; border-radius: 10px;
  cursor: pointer; font-size: 0.86em; line-height: 1.4;
  transition: all 0.15s; text-align: left; color: #ddd;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.iv-choice:hover { border-color: #ffd166; background: #25253d; }
.iv-choice:disabled { opacity: 0.5; cursor: not-allowed; }

/* タイピング（連打）チャレンジ */
.iv-mash-wrap { text-align: center; }
.iv-mash-desc { font-size: 0.82em; color: #888; margin-bottom: 10px; }
.iv-mash-cd   { font-size: 2.2em; font-weight: bold; color: #e74c3c; margin-bottom: 8px;
                font-variant-numeric: tabular-nums; }
.iv-mash-count { font-size: 1.1em; color: #ffd166; margin-bottom: 10px; }
.iv-mash-btn {
  width: 100%; padding: 16px; background: #ffd166; color: #0a0a16;
  border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold;
  cursor: pointer; font-family: inherit;
  animation: mashGlow 0.4s ease-in-out infinite alternate;
  -webkit-tap-highlight-color: transparent;
}
.iv-mash-btn:disabled { opacity: 0.4; animation: none; }
.iv-mash-btn:active   { transform: scale(0.95); }
@keyframes mashGlow { to { box-shadow: 0 0 18px rgba(255,209,102,0.55); } }

/* バレ度インライン */
.iv-bare-wrap2 { margin-top: 14px; }
.iv-bare-label { font-size: 0.75em; color: #e74c3c; margin-bottom: 4px; }
.iv-bare-bar-wrap { height: 8px; background: #0a0a16; border-radius: 4px; overflow: hidden; }
.iv-bare-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease;
                    background: linear-gradient(90deg, #2ecc71, #e74c3c); }
.iv-bare-pct { font-size: 0.8em; color: #ffd166; margin-top: 4px; }

/* 面接結果 */
.iv-result-wrap { text-align: center; }
.iv-result-emoji { font-size: 3em; margin-bottom: 8px; }
.iv-result-title { font-size: 1.1em; font-weight: bold; color: #ffd166; margin-bottom: 6px; }
.iv-result-desc  { font-size: 0.84em; color: #aaa; line-height: 1.7; margin-bottom: 16px; }
.iv-close-btn {
  width: 100%; padding: 14px; background: #ffd166; color: #0a0a16;
  border: none; border-radius: 10px; font-size: 1em; font-weight: bold;
  cursor: pointer; font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.iv-close-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="titleScreen">
  <div class="ts-emoji">📄</div>
  <h2>嘘つき履歴書<br>ジェネレーター CHAOS</h2>
  <p>5問の性格診断をもとに<br>最高に盛った履歴書を自動生成。<br>盛り度レベル1〜4、10種の性格タイプ。</p>
  <button class="ts-btn" onclick="startResume()">🔍 診断を開始する</button>
  <div class="ts-hint">※ 実際の就活には使用しないでください</div>
</div>

<!-- ローディング -->
<div id="loadingOverlay">
  <div class="lo-dots"><div class="lo-dot"></div><div class="lo-dot"></div><div class="lo-dot"></div></div>
  <div class="lo-text">盛り盛り履歴書を作成中…</div>
</div>

<div class="container">
  <div class="title-area">
    <h1>📄 嘘つき履歴書ジェネレーター CHAOS</h1>
    <div class="sub">あなたの性格を診断して、最高に盛った履歴書を作ります</div>
  </div>

  <!-- アンケート -->
  <div class="quiz-box" id="quizBox">
    <div class="quiz-progress" id="quizProgress"></div>
    <div class="q-num" id="qNum">Q1 / 5</div>
    <div class="q-text" id="qText"></div>
    <div class="q-choices" id="qChoices"></div>
  </div>

  <!-- 入力フォーム（診断後に表示） -->
  <div class="form-box" id="formBox" style="display:none">
    <h2>📝 あなたの情報を入力</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>名前</label>
        <input id="inName" type="text" placeholder="田中 太郎">
      </div>
      <div class="form-row">
        <label>年齢</label>
        <input id="inAge" type="number" placeholder="22" min="18" max="60">
      </div>
    </div>
    <div class="form-row">
      <label>志望職種</label>
      <select id="inJob">
        <option value="consultant">コンサルタント</option>
        <option value="engineer">エンジニア（バックエンド）</option>
        <option value="frontend">エンジニア（フロントエンド）</option>
        <option value="aiml">AIエンジニア / データサイエンティスト</option>
        <option value="sales">営業職</option>
        <option value="marketing">マーケター</option>
        <option value="pm">プロジェクトマネージャー</option>
        <option value="finance">金融アナリスト</option>
        <option value="design">デザイナー（UI/UX）</option>
        <option value="hr">人事・採用</option>
        <option value="law">法務・コンプライアンス</option>
        <option value="game">ゲームクリエイター</option>
        <option value="youtuber">YouTuber / クリエイター</option>
        <option value="startup">起業家・スタートアップ</option>
        <option value="general">総合職</option>
      </select>
    </div>
    <div class="form-row">
      <label>本当の強み（正直に）</label>
      <input id="inStrength" type="text" placeholder="例：コミュ力、粘り強さ">
    </div>
    <div class="form-row">
      <label>趣味・特技</label>
      <input id="inHobby" type="text" placeholder="例：読書、筋トレ、料理">
    </div>
    <div class="form-row">
      <label>保有資格（あれば）</label>
      <input id="inCert" type="text" placeholder="例：TOEIC800点、FP3級">
    </div>
    <div class="form-row">
      <label>志望動機のキーワード</label>
      <input id="inMotiv" type="text" placeholder="例：社会貢献、成長、チャレンジ">
    </div>
    <button class="gen-btn" id="genBtn">✨ 履歴書を生成する</button>
  </div>

  <!-- 性格タイプ -->
  <div class="type-result" id="typeResult"></div>

  <!-- 盛り度 -->
  <div class="bs-meter" id="bsMeter">
    <div class="bs-label">📊 盛り度メーター</div>
    <div class="bs-bar-wrap"><div class="bs-bar-fill" id="bsBar" style="width:0%"></div></div>
    <div class="bs-comment" id="bsComment"></div>
  </div>

  <!-- アクション -->
  <div class="action-row" id="actionRow">
    <button class="reset-btn" id="resetBtn">🔄 最初から</button>
    <button class="regen-btn" id="regenBtn">♻️ 再生成</button>
    <button class="copy-btn" id="copyBtn">📋 コピー</button>
  </div>

  <!-- 履歴書 -->
  <div class="resume-box" id="resumeBox"></div>

  <!-- AI対決 -->
  <div class="ai-battle" id="aiBattle" style="display:none">
    <div class="aib-header">

// ============================================================
// 性格判定ロジック
// ============================================================
function determineType(answers) {
  const key = answers.join('');
  if (TYPES[key]) return TYPES[key];

  // カウント
  const count = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach(a => count[a]++);
  const max = Math.max(...Object.values(count));
  const dominant = Object.keys(count).find(k => count[k] === max);

  // 組み合わせパターン
  if (count.A >= 3) return TYPES.AAAA;
  if (count.B >= 3) return TYPES.BBBB;
  if (count.C >= 3) return TYPES.CCCC;
  if (count.D >= 3) return TYPES.DDDD;
  if (count.A >= 2 && count.B >= 2) return TYPES.ABAB;
  if (count.C >= 2 && count.D >= 2) return TYPES.CDCD;
  if (count.A >= 1 && count.B >= 1 && count.C >= 1 && count.D >= 1) return TYPES.ABCD;
  if (count.D >= 2 && count.C >= 2) return TYPES.DCBA;
  if (count.A >= 2 && count.B >= 2) return TYPES.BBAA;
  if (count.A >= 2) return TYPES.AABB;
  return TYPES.ABCD;
}

let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playClick() {
  try {
    const ctx = getACtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = 660;
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.14);
  } catch(e) {}
}
function playReveal() {
  try {
    const ctx = getACtx();
    [440, 554, 660, 880].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.07, ctx.currentTime + i * 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.22);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.1);
      o.stop(ctx.currentTime + i * 0.1 + 0.24);
    });
  } catch(e) {}
}

let answers = [];
let currentQ = 0;
let currentType = null;

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('qNum').textContent = `Q${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('qText').textContent = q.text;

  const choicesEl = document.getElementById('qChoices');
  choicesEl.innerHTML = '';
  q.choices.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'q-choice';
    btn.textContent = c.text;
    btn.addEventListener('click', () => {
      playClick();
      btn.classList.add('selected');
      answers.push(c.type);
      currentQ++;
      setTimeout(() => {
        if (currentQ >= QUESTIONS.length) {
          finishQuiz();
        } else {
          updateProgress();
          renderQuestion();
        }
      }, 120);
    });
    choicesEl.appendChild(btn);
  });

  updateProgress();
}

function updateProgress() {
  const prog = document.getElementById('quizProgress');
  prog.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'qp-dot' + (i < currentQ ? ' done' : i === currentQ ? ' active' : '');
    prog.appendChild(dot);
  });
}

function finishQuiz() {
  currentType = determineType(answers);
  document.getElementById('quizBox').style.display = 'none';
  document.getElementById('formBox').style.display = 'block';

  // タイプ結果表示
  const tr = document.getElementById('typeResult');

  tr.classList.add('show');
}

// ============================================================
// 面接フェーズ
// ============================================================
let bareScore = 0;  // 0〜100 バレ度

function updateBareBar() {
  const pct = Math.min(100, bareScore);
  document.getElementById('ivBareBarInline').style.width = pct + '%';
  document.getElementById('ivBarePct').textContent = pct + '%';
}

function showInterview(bsLevel) {
  bareScore = 0;
  let ivStep = 0;
  const panel = document.getElementById('interviewPanel');
  const ivInterviewer = document.getElementById('ivInterviewer');
  const ivQcount = document.getElementById('ivQcount');
  const ivQuestion = document.getElementById('ivQuestion');
  const ivContent  = document.getElementById('ivContent');
  let isAlien = false;
  updateBareBar();
  panel.classList.add('show');

  function alienize(text) {
    if (!isAlien) return text;
    return text.split('').map(c => {
      const r = Math.random();
      if (r < 0.3) return ['ʷ','ₓ','ᵒ','ₑ','ᵷ','ʟ','ᴢ','ᵴ'][Math.floor(Math.random()*8)];
      return c;
    }).join('');
  }

  const STEPS = [
    // Q1: 3択言い訳
    () => {
      ivQcount.textContent = 'Q 1 / 3';
      const q = bsLevel >= 4
        ? alienize('「ハーバード大学合格・辞退とありますが、証拠書類はお持ちですか？」')
        : alienize('「インターンMVP受賞とありますが、詳しく教えてください」');
      ivQuestion.textContent = q;
      const choices = bsLevel >= 4
        ? [
            { text: '「辞退証明書があります！…今日は持ってきてなくて」',  bare: 15 },
            { text: '「全てデータで管理しています。今すぐ送れます」',      bare: 5  },
            { text: '「書類は保存場所ごと燃えました（火事で）」',          bare: 45 },
          ]
        : [
            { text: '「チームで取り組んだ成果です。私がリードしました」',  bare: 5  },
            { text: '「具体的には…その、色々な面で」',                    bare: 25 },
            { text: '「記憶が曖昧なんですが確かそうだったはずで…」',      bare: 40 },
          ];
      ivContent.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.className = 'iv-choices';
      choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'iv-choice';
        btn.textContent = alienize(ch.text);
        btn.addEventListener('click', () => {
          wrap.querySelectorAll('.iv-choice').forEach(b => b.disabled = true);
          bareScore = Math.min(100, bareScore + ch.bare);
          updateBareBar();
          setTimeout(() => nextStep(), 500);
        });
        wrap.appendChild(btn);
      });
      ivContent.appendChild(wrap);
    },

    // Q2: 連打チャレンジ（McKinsey説明）
    () => {
      ivQcount.textContent = 'Q 2 / 3';
      ivQuestion.textContent = alienize('「McKinseyでのインターン実績を詳しくご説明ください。今すぐ！」');
      ivContent.innerHTML = '';

      // ランダムで面接官が宇宙人に変わる（30%）
      if (Math.random() < 0.30 && !isAlien) {
        isAlien = true;
        ivInterviewer.textContent = '👽 面接官（宇宙人）';
        ivQuestion.textContent = alienize('「ᵷₑᴢᵷₓ McKinseyʷ ᵒₑᵷ ᵴₓʟᵷ ?!」');
        bareScore = Math.min(100, bareScore + 15);
        updateBareBar();
      }

      let secs = 4, clickCount = 0;
      const wrap = document.createElement('div');
      wrap.className = 'iv-mash-wrap';
      wrap.innerHTML = `
        <div class="iv-mash-desc">${alienize('3秒以内にボタンを連打して説明せよ！')}</div>
        <div class="iv-mash-cd" id="ivMashCd">${secs}</div>
        <div class="iv-mash-count" id="ivMashCount">0 回</div>
        <button class="iv-mash-btn" id="ivMashBtn">${alienize('💬 説明する！')}</button>
      `;
      ivContent.appendChild(wrap);

      const mashBtn  = document.getElementById('ivMashBtn');
      const mashCd   = document.getElementById('ivMashCd');
      const mashCount= document.getElementById('ivMashCount');

      mashBtn.addEventListener('click', () => {
        clickCount++;
        mashCount.textContent = clickCount + ' 回';
      });

      const cdTimer = setInterval(() => {
        secs--;
        mashCd.textContent = secs;
        if (secs <= 0) {
          clearInterval(cdTimer);
          mashBtn.disabled = true;
          const quality = clickCount < 5 ? 'terrible' : clickCount < 12 ? 'ok' : 'great';
          const addBare = quality === 'terrible' ? 35 : quality === 'ok' ? 15 : 0;
          bareScore = Math.min(100, bareScore + addBare);
          updateBareBar();
          setTimeout(() => nextStep(), 600);
        }
      }, 1000);
    },

    // Q3: 2択（宇宙人）
    () => {
      ivQcount.textContent = 'Q 3 / 3';
      ivQuestion.textContent = alienize('「"宇宙人対応経験あり" とありますが、これは…どういう意味ですか？（真顔）」');
      ivContent.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.className = 'iv-choices';
      const choices = [
        { text: alienize('真顔で「はい、3件対応した実績があります」と答える'), bare: 0 },
        { text: alienize('思わず「あはは…」と笑ってしまう'), bare: 30 },
      ];
      choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'iv-choice';
        btn.textContent = ch.text;
        btn.addEventListener('click', () => {
          wrap.querySelectorAll('.iv-choice').forEach(b => b.disabled = true);
          bareScore = Math.min(100, bareScore + ch.bare);
          updateBareBar();
          setTimeout(() => showResult(), 600);
        });
        wrap.appendChild(btn);
      });
      ivContent.appendChild(wrap);
    },
  ];

  function nextStep() {
    ivStep++;
    if (ivStep < STEPS.length) {
      STEPS[ivStep]();
    } else {
      showResult();
    }
  }

  function showResult() {
    ivQcount.textContent = '面接終了';
    ivQuestion.textContent = '';
    const pct = Math.min(100, bareScore);
    const results = [
      { max: 25,  emoji: '😌', title: 'ほぼバレなかった！', desc: '面接官を完璧に騙しました。才能の無駄遣いです。' },
      { max: 50,  emoji: '😅', title: 'ちょっと怪しまれた…', desc: '面接官の表情が数回曇りましたが、なんとか切り抜けました。' },
      { max: 75,  emoji: '😰', title: 'かなり疑われています', desc: '「後日確認します」と言われました。返事は来ないでしょう。' },
      { max: 101, emoji: '💀', title: '完全にバレました', desc: '面接官が書類を丸めて捨てました。お疲れ様でした。' },
    ];
    const res = results.find(r => pct <= r.max) || results[results.length - 1];
    ivContent.innerHTML = `
      <div class="iv-result-wrap">
        <div class="iv-result-emoji">${res.emoji}</div>
        <div class="iv-result-title">${res.title}（バレ度 ${pct}%）</div>
        <div class="iv-result-desc">${res.desc}</div>
        <button class="iv-close-btn" onclick="closeInterview(${pct})">結果を確認する</button>
      </div>
    `;
  }

  // 最初のステップ開始
  STEPS[0]();
}

function closeInterview(pct) {
  document.getElementById('interviewPanel').classList.remove('show');
  // バレ度メーター（外側）に反映
  const deg = document.getElementById('bareDeg');
  deg.classList.add('show');
  setTimeout(() => {
    document.getElementById('bdBar').style.width = pct + '%';
    const comments = [
      '😌 ほぼバレなかった！才能の無駄遣いです',
      '😅 ちょっと怪しまれたが乗り切った',
      '😰 かなり疑われています。次の連絡は来ないかも',
      '💀 完全にバレました。お疲れ様でした',
    ];
    const idx = pct <= 25 ? 0 : pct <= 50 ? 1 : pct <= 75 ? 2 : 3;
    document.getElementById('bdComment').textContent = comments[idx];
  }, 100);
  // AI対決を起動
  const aib = document.getElementById('aiBattle');
  aib.style.display = 'block';
  setTimeout(runAIBattle, 600);
}

function runAIBattle() {
  const aiName = pick(AI_DATA.names);
  const aiUni  = pick(AI_DATA.universities);
  const aiInterns = pickN(AI_DATA.internships, 2);
  const aiAchs    = pickN(AI_DATA.achievements, 3);
  const aiSkills  = pickN(AI_DATA.skills, 4);
  const aiPr      = pick(AI_DATA.prs);
  const aiScore   = 88 + Math.floor(Math.random() * 12); // 88-99%

  // バーとスコア更新
  document.getElementById('aibYourName').textContent  = lastUserName;
  document.getElementById('aibAiName').textContent    = aiName;
  document.getElementById('aibYourScore').textContent = '...';
  document.getElementById('aibAiScore').textContent   = '...';
  document.getElementById('aibYourBar').style.width = '0%';
  document.getElementById('aibAiBar').style.width   = '0%';

  setTimeout(() => {
    document.getElementById('aibYourBar').style.width   = lastBsScore + '%';
    document.getElementById('aibYourScore').textContent = lastBsScore + '%';
    document.getElementById('aibAiBar').style.width   = aiScore + '%';
    document.getElementById('aibAiScore').textContent = aiScore + '%';
  }, 200);

  // AI経歴表示
  document.getElementById('aibAiEntries').innerHTML = `
    <div class="e-title">🤖 ${aiName} の経歴（抜粋）</div>
    <div>🎓 ${aiUni}</div>
    ${aiInterns.map(i => `<div>💼 ${i}</div>`).join('')}
    ${aiAchs.map(a => `<div class="e-ach">🏆 ${a}</div>`).join('')}
    <div style="margin-top:4px">🛠 ${aiSkills.join(' ／ ')}</div>
    <div class="e-pr">💬 ${aiPr}</div>
  `;

  // 判定
  const diff = aiScore - lastBsScore;
  let emoji, title, sub, borderColor;
  if (diff > 25) {
    emoji = '💀'; title = 'AIの完全勝利。次元が違います';
    sub = `差：${diff}%　人類の限界を超えた盛り度です`;
    borderColor = '#e74c3c60';
  } else if (diff > 8) {
    emoji = '😰'; title = 'AIが勝利…でも善戦しました';
    sub = `あと${diff}%。あなたはまだ人間の範囲内です`;
    borderColor = '#f39c1260';
  } else if (diff >= -8) {
    emoji = '🤝'; title = '引き分け！人間とAIが並んだ歴史的瞬間';
    sub = '五分五分。AIに追いつきつつある危険な人間です';
    borderColor = '#ffd16660';
  } else {
    emoji = '🎉'; title = `${lastUserName}の勝利！AIより盛った人間、爆誕`;
    sub = `差：${-diff}%　人類の可能性は無限大です（倫理的には問題あり）`;
    borderColor = '#2ecc7160';
  }

  const verdict = document.getElementById('aibVerdict');
  verdict.style.borderColor = borderColor;
  document.getElementById('aibVerdictEmoji').textContent = emoji;
  document.getElementById('aibVerdictTitle').textContent = title;
  document.getElementById('aibVerdictSub').textContent   = sub;
}
